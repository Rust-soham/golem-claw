# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0/golem.schema.json

manifestVersion: 1.5.0

app: golem-claw

environments:
  local:
    server: local
    componentPresets: quick
  cloud:
    server: cloud
    componentPresets: release

components:
  golem-claw:ts-main:
    dir: ""
    templates: ts-pnpm
    env:

componentTemplates:
  ts-pnpm:
    customCommands:
      ts-npm-install:
        - command: pnpm install
    presets:
      optimized:
        default: true
        build:
          - command: pnpm exec tsc --project "{{ componentDir }}" --noEmit false --emitDeclarationOnly --declaration --outFile "{{ golemTempDir }}/ts-check/{{ component_name | to_kebab_case }}/main.d.ts"
            sources:
              - "{{ componentDir }}/src"
              - "{{ componentDir }}/tsconfig.json"
              - "{{ appRootDir }}/package.json"
            targets:
              - "{{ golemTempDir }}/ts-check/{{ component_name | to_kebab_case }}/main.d.ts"
          - command: '"{{ componentDir }}/node_modules/.bin/golem-typegen" "{{ componentDir }}/tsconfig.json" --files "{{ componentDir }}/src/**/*.ts"'
            dir: "{{ golemTempDir }}/ts-metadata/{{ component_name | to_kebab_case }}"
            sources:
              - "{{ componentDir }}/src"
              - "{{ componentDir }}/tsconfig.json"
              - "{{ appRootDir }}/package.json"
            targets:
              - .metadata
          - command: pnpm exec rollup -c "{{ componentDir }}/rollup.config.component.mjs"
            dir: "{{ componentDir }}"
            env:
              GOLEM_APP_ROOT: "{{ appRootDir }}"
              GOLEM_TEMP: "{{ golemTempDir }}"
              GOLEM_COMPONENT_NAME: "{{ component_name | to_kebab_case }}"
            sources:
              - "{{ componentDir }}/src"
              - "{{ componentDir }}/rollup.config.component.mjs"
              - "{{ componentDir }}/tsconfig.json"
              - "{{ appRootDir }}/package.json"
              - "{{ golemTempDir }}/ts-metadata/{{ component_name | to_kebab_case }}"
            targets:
              - "{{ golemTempDir }}/ts-dist/{{ component_name | to_kebab_case }}/main.js"
          - injectToPrebuiltQuickjs: "{{ appRootDir }}/node_modules/@golemcloud/golem-ts-sdk/wasm/agent_guest.wasm"
            module: "{{ golemTempDir }}/ts-dist/{{ component_name | to_kebab_case }}/main.js"
            into: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.dynamic.wasm"
          - preinitializeJs: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.dynamic.wasm"
            into: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.preinitialized.wasm"
        componentWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.preinitialized.wasm"
        outputWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.wasm"
      quick:
        build:
          - command: pnpm exec tsc --project "{{ componentDir }}" --noEmit false --emitDeclarationOnly --declaration --outFile "{{ golemTempDir }}/ts-check/{{ component_name | to_kebab_case }}/main.d.ts"
            sources:
              - "{{ componentDir }}/src"
              - "{{ componentDir }}/tsconfig.json"
              - "{{ appRootDir }}/package.json"
            targets:
              - "{{ golemTempDir }}/ts-check/{{ component_name | to_kebab_case }}/main.d.ts"
          - command: '"{{ componentDir }}/node_modules/.bin/golem-typegen" "{{ componentDir }}/tsconfig.json" --files "{{ componentDir }}/src/**/*.ts"'
            dir: "{{ golemTempDir }}/ts-metadata/{{ component_name | to_kebab_case }}"
            sources:
              - "{{ componentDir }}/src"
              - "{{ componentDir }}/tsconfig.json"
              - "{{ appRootDir }}/package.json"
            targets:
              - .metadata
          - command: pnpm exec rollup -c "{{ componentDir }}/rollup.config.component.mjs"
            dir: "{{ componentDir }}"
            env:
              GOLEM_APP_ROOT: "{{ appRootDir }}"
              GOLEM_TEMP: "{{ golemTempDir }}"
              GOLEM_COMPONENT_NAME: "{{ component_name | to_kebab_case }}"
            sources:
              - "{{ componentDir }}/src"
              - "{{ componentDir }}/rollup.config.component.mjs"
              - "{{ componentDir }}/tsconfig.json"
              - "{{ appRootDir }}/package.json"
              - "{{ golemTempDir }}/ts-metadata/{{ component_name | to_kebab_case }}"
            targets:
              - "{{ golemTempDir }}/ts-dist/{{ component_name | to_kebab_case }}/main.js"
          - injectToPrebuiltQuickjs: "{{ appRootDir }}/node_modules/@golemcloud/golem-ts-sdk/wasm/agent_guest.wasm"
            module: "{{ golemTempDir }}/ts-dist/{{ component_name | to_kebab_case }}/main.js"
            into: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.dynamic.wasm"
        componentWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.dynamic.wasm"
        outputWasm: "{{ golemTempDir }}/agents/{{ component_name | to_snake_case }}.wasm"

httpApi:
  deployments:
    local:
      - domain: golem-claw.localhost:9006
        agents:
          CounterAgent: {}
    cloud:
      - domain: golem-claw.apps.golem.cloud
        agents:
          CounterAgent: {}
